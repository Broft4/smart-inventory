<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора - Ревизия</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container admin-container">
        <header>
            <h1>Итоги ревизии</h1>
            <div style="text-align: center; margin-bottom: 20px;">
                <a href="/" style="color: #007bff; text-decoration: none;">← Вернуться к сканеру</a>
            </div>
        </header>

        <div class="report-summary category-card">
            <h2>Сводка по точке: <span id="report-location">Загрузка...</span></h2>
            <p><strong>Дата:</strong> <span id="report-date">-</span></p>
            <div class="totals">
                <p class="total-plus">Излишки: <span id="total-plus">0</span> шт.</p>
                <p class="total-minus">Недостача: <span id="total-minus">0</span> шт.</p>
            </div>
        </div>

        <h2 style="margin-top: 30px;">Детализация</h2>
        <div id="report-categories">
            <p style="text-align: center;">Загрузка данных...</p>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
