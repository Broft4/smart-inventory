<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container admin-container">
        <header>
            <h1>Итоги ревизии</h1>
            <div class="admin-controls stacked-controls">
                <div class="control-block">
                    <label for="admin-location-select">Точка:</label>
                    <select id="admin-location-select">
                        <option value="Дубна">Дубна</option>
                        <option value="Дмитров">Дмитров</option>
                    </select>
                </div>
                <div class="control-block">
                    <label for="admin-report-select">Ревизия:</label>
                    <select id="admin-report-select"></select>
                </div>
                <div class="admin-actions-row">
                    <button id="delete-report-btn" type="button" class="danger-btn" disabled>Удалить ревизию</button>
                </div>
            </div>
        </header>

        <div class="report-summary category-card">
            <h2>Сводка по ревизии</h2>
            <div class="report-meta-grid">
                <p><strong>Точка:</strong> <span id="report-location">-</span></p>
                <p><strong>Дата:</strong> <span id="report-date">-</span></p>
                <p><strong>Статус:</strong> <span id="report-status">-</span></p>
                <p><strong>ID:</strong> <span id="report-id">-</span></p>
            </div>
            <div class="totals">
                <p class="total-plus">Излишки: <span id="total-plus">0</span> шт.</p>
                <p class="total-minus">Недостача: <span id="total-minus">0</span> шт.</p>
            </div>
        </div>

        <h2 style="margin-top: 30px;">Детализация</h2>
        <div id="report-categories">
            <p style="text-align: center;">Загрузка данных...</p>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
