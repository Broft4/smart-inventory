<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Умная ревизия</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Умная ревизия</h1>
    </header>

    <div id="start-screen" class="screen active">
        <h2>Выберите точку</h2>
        <select id="location-select">
            <option value="Дмитров">Дмитров</option>
            <option value="Дубна">Дубна</option>
        </select>
        <button id="start-btn" class="btn primary">Начать ревизию</button>
    </div>

    <div id="inventory-screen" class="screen" style="display: none;">
        <div class="top-bar">
            <h2 id="current-location-title" style="margin: 0;"></h2>
            <button id="finish-btn" onclick="finishInventory()" class="finish-btn" disabled>Завершить</button>
        </div>
        <div id="categories-container"></div>
    </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
