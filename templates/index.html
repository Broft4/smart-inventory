<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Умная Ревизия</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Умная Ревизия</h1>
        </header>

        <div id="start-screen" class="screen active">
            <h2>Выберите точку:</h2>
            <select id="location-select">
                <option value="Дмитров">Дмитров</option>
                <option value="Дубна">Дубна</option>
            </select>
            <button id="start-btn" class="btn primary">Начать инвентаризацию</button>
        </div>

        <div id="inventory-screen" class="screen" style="display: none;">
            <h2 id="current-location-title"></h2>
            <div id="categories-container"></div>
        </div>

        <div id="scanner-screen" style="display: none;">
            <header>
                <h2>Точка: <span id="current-location"></span></h2>
                <button onclick="finishInventory()" style="background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Завершить ревизию</button>
            </header>
            
            <div id="categories-container">
                </div>
        </div>

    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
