<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — UCHETKA</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
    <link rel="icon" type="image/png" href="/static/img/uchetka-mark.png?v={{ asset_version }}">
</head>
<body>
<div class="container auth-container">
    <div class="auth-card auth-card-branded">
        <div class="auth-brand">
            <img src="/static/img/uchetka-mark.png?v={{ asset_version }}" alt="UCHETKA — ЭФФЕКТИВНЫЙ УЧЕТ И КОНТРОЛЬ" class="auth-brand-logo">
        </div>
        <h1>Вход в UCHETKA</h1>
        <p class="auth-subtitle">Войдите по логину и паролю, которые выдал управляющий.</p>
        <form id="login-form" class="auth-form">
            <label>
                Логин
                <input type="text" id="username" autocomplete="username" required>
            </label>
            <label>
                Пароль
                <input type="password" id="password" autocomplete="current-password" required>
            </label>
            <div class="auth-actions">
                <button type="submit" class="btn primary auth-submit-btn">Войти</button>
                <button type="button" id="open-password-reset-btn" class="btn secondary auth-secondary-action">Забыли пароль?</button>
            </div>
            <div id="login-message" class="message auth-message"></div>
        </form>
    </div>
</div>

<div id="password-reset-modal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card form-modal-card">
        <div class="modal-header">
            <div>
                <h2>Восстановление пароля</h2>
                <p class="muted-text">Введите email, указанный в карточке сотрудника. На него придёт код восстановления.</p>
            </div>
            <button id="close-password-reset-modal-btn" class="btn secondary btn-inline" type="button">Закрыть</button>
        </div>

        <form id="password-reset-request-form" class="auth-form" novalidate>
            <label>Email
                <input type="email" id="reset-email" autocomplete="email" required>
            </label>
            <div class="form-actions">
                <button type="submit" class="btn primary">Отправить код</button>
            </div>
        </form>

        <form id="password-reset-verify-form" class="auth-form hidden" novalidate>
            <label>Код из письма
                <input type="text" id="reset-code" inputmode="numeric" autocomplete="one-time-code" maxlength="12" required>
            </label>
            <div class="form-actions">
                <button type="submit" class="btn primary">Проверить код</button>
                <button type="button" id="password-reset-back-btn" class="btn secondary">Изменить email</button>
            </div>
        </form>

        <form id="password-reset-complete-form" class="auth-form hidden" novalidate>
            <label>Новый пароль
                <input type="password" id="reset-new-password" autocomplete="new-password" required>
            </label>
            <label>Повторите новый пароль
                <input type="password" id="reset-new-password-confirm" autocomplete="new-password" required>
            </label>
            <div class="form-actions">
                <button type="submit" class="btn primary">Сохранить пароль</button>
            </div>
        </form>

        <div id="password-reset-message" class="message auth-message"></div>
    </div>
</div>

<script src="/static/js/login.js?v={{ asset_version }}"></script>
</body>
</html>
